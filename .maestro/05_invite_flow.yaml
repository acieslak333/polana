appId: com.polana.app
name: "05 — Generate invite link from Gromada admin panel"
tags:
  - critical
  - invites

---

- launchApp

# Navigate to Gromady tab
- tapOn: "Gromady"

# Open first gromada
- tapOn:
    index: 0
    id: "gromada-card"

# Open info panel
- tapOn:
    id: "gromada-info-button"

# Info screen is visible
- assertVisible:
    id: "gromada-info-title"

# Invite button only visible for elders — if not elder the test will stop here
- tapOn:
    id: "invite-button"

# Invite screen visible
- assertVisible:
    id: "invite-screen-title"

# Generate link
- tapOn:
    id: "generate-link-button"

# Wait for generation
- waitForAnimationToEnd

# Link appeared
- assertVisible: "polana://"
- assertVisible:
    id: "share-link-button"
