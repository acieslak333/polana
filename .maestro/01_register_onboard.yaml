appId: com.polana.app
name: "01 — Register and complete onboarding"
tags:
  - critical
  - onboarding

---

# Launch the app
- launchApp:
    clearState: true

# Should land on welcome screen
- assertVisible:
    id: "welcome-title"

# Tap register button
- tapOn:
    id: "sign-up-button"

# Fill registration form
- tapOn:
    id: "email-input"
- inputText: "test.e2e@polana.app"

- tapOn:
    id: "password-input"
- inputText: "TestPass123!"

- tapOn:
    id: "password-confirm-input"
- inputText: "TestPass123!"

- tapOn:
    id: "register-submit-button"

# Email verification step — in test env use a seeded verified account
# In CI: use EXPO_PUBLIC_E2E_MODE=true to skip email verification
- waitForAnimationToEnd

# Step 1/7 — Profile setup
- assertVisible:
    id: "onboarding-step-title"
- tapOn:
    id: "first-name-input"
- inputText: "TestUser"
- tapOn:
    id: "next-button"

# Step 2/7 — Interests (pick 3)
- assertVisible:
    id: "onboarding-step-title"
- tapOn: "Kawa i herbata"
- tapOn: "Spacery z psami"
- tapOn: "Gry planszowe"
- tapOn:
    id: "next-button"

# Step 3/7 — City
- assertVisible:
    id: "onboarding-step-title"
- tapOn: "Warszawa"
- tapOn:
    id: "next-button"

# Step 4/7 — Gromady
- assertVisible:
    id: "onboarding-step-title"
- tapOn:
    index: 0
    id: "gromada-card"
- tapOn:
    id: "next-button"

# Step 5/7 — Notifications
- assertVisible:
    id: "onboarding-step-title"
- tapOn:
    id: "notifications-skip-button"

# Step 6/7 — Rules
- assertVisible:
    id: "onboarding-step-title"
- tapOn:
    id: "rules-agree-checkbox"
- tapOn:
    id: "next-button"

# Step 7/7 — Ready
- assertVisible:
    id: "ready-title"
- tapOn:
    id: "ready-cta-button"

# Should land on the main feed
- assertVisible: "Feed"
