appId: com.polana.app
name: "03 — RSVP to an event and verify in calendar"
tags:
  - critical
  - events

---

- launchApp

# Navigate to Map/Events tab
- tapOn: "Mapa"

# Switch to list view
- tapOn:
    id: "events-list-view"

# Tap first event card
- tapOn:
    index: 0
    id: "event-card"

# Tap "going" RSVP button
- tapOn:
    id: "rsvp-going-button"

# Confirm RSVP registered
- waitForAnimationToEnd

# Navigate to profile calendar
- tapOn: "Profil"
- tapOn:
    id: "calendar-button"

# Verify event appears in upcoming
- assertVisible: "Nadchodzące"
